name: Deploy Smoke Check

on:
  workflow_dispatch:
    inputs:
      backend_url:
        description: "Backend base URL (e.g. https://api.example.com)"
        required: true
        type: string
      frontend_url:
        description: "Frontend base URL (e.g. https://app.example.com)"
        required: true
        type: string

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run smoke checks
        run: |
          chmod +x scripts/smoke_check.sh
          ./scripts/smoke_check.sh "${{ inputs.backend_url }}" "${{ inputs.frontend_url }}"
