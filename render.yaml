databases:
  - name: digital-cmo-postgres
    plan: basic-256mb
    databaseName: digital_cmo
    user: digital_cmo_user

services:
  - type: web
    name: digital-cmo-api
    env: python
    plan: starter
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health/ready
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: digital-cmo-postgres
          property: connectionString
      - key: DEBUG
        value: "false"
      - key: APP_BASE_URL
        value: "https://digital-cmo-api.onrender.com"
      - key: FRONTEND_BASE_URL
        value: "https://your-vercel-app.vercel.app"
      - key: CORS_ORIGINS_CSV
        value: "https://your-vercel-app.vercel.app"
      - key: SECRET_KEY
        generateValue: true
      - key: OPENAI_API_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PRICE_PRO_MONTHLY
        sync: false
      - key: STRIPE_PRICE_ENTERPRISE_MONTHLY
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USERNAME
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM_EMAIL
        value: "no-reply@digital-cmo-ai.local"
      - key: POSTHOG_API_KEY
        sync: false
      - key: POSTHOG_HOST
        value: "https://app.posthog.com"
